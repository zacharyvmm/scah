name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  rust:
    name: Rust Check and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mold
        uses: rui314/setup-mold@v1
        if: runner.os == 'Linux'
      - name: Install clang
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-targets --all-features

  rust-publish:
    name: Publish Cargo package
    needs: [rust]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  python-build:
    name: Python Build Wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [x86_64, aarch64]
        os: [ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - name: Install mold
        uses: rui314/setup-mold@v1
        if: runner.os == 'Linux'
      - name: Install clang
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          working-directory: python
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist

  python-publish:
    name: Publish Python wheels to PyPI
    needs: [python-build, rust]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  nodejs-build:
    name: Node.js Addon Build (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-14
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Install mold
        uses: rui314/setup-mold@v1
        if: runner.os == 'Linux'
      - name: Install clang
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-node-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies
        working-directory: nodejs
        run: bun install
      - name: Build addon
        working-directory: nodejs
        run: bun run build
      - name: Upload addon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-addon-${{ matrix.settings.target }}
          path: nodejs/*.node
          if-no-files-found: error

  nodejs-publish:
    name: Publish Node.js Addon to NPM
    needs: [nodejs-build, rust]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: nodejs
        run: bun install
      - name: Download all built addons
        uses: actions/download-artifact@v4
        with:
          pattern: nodejs-addon-*
          path: nodejs/artifacts
          merge-multiple: true
      - name: Move artifacts
        working-directory: nodejs
        run: bun run artifacts
      - name: Publish to npm
        working-directory: nodejs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bun run prepublishOnly
          npm config set provenance true
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" >> ~/.npmrc
          npm publish --access public
