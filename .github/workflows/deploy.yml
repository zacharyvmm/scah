name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/tests.yml

  rust-publish:
    name: Publish Cargo crate
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish scah
        run: cargo publish --manifest-path crates/scah/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  python-build:
    name: Python Build Wheels (${{ matrix.target }})
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [x86_64, aarch64]
        os: [ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          working-directory: crates/bindings/scah-python
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: crates/bindings/scah-python/dist

  python-publish:
    name: Publish Python wheels to PyPI
    needs: [python-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  nodejs-build:
    name: Node.js Addon Build (${{ matrix.settings.target }})
    needs: [test]
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-13
            target: x86_64-apple-darwin
          - host: macos-14
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-node-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies
        working-directory: crates/bindings/scah-node
        run: bun install
      - name: Build addon
        working-directory: crates/bindings/scah-node
        run: bun run build
      - name: Upload addon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-addon-${{ matrix.settings.target }}
          path: crates/bindings/scah-node/*.node
          if-no-files-found: error

  nodejs-publish:
    name: Publish Node.js Addon to NPM
    needs: [nodejs-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: crates/bindings/scah-node
        run: bun install
      - name: Download all built addons
        uses: actions/download-artifact@v4
        with:
          pattern: nodejs-addon-*
          path: crates/bindings/scah-node/artifacts
          merge-multiple: true
      - name: Move artifacts
        working-directory: crates/bindings/scah-node
        run: |
          bunx napi create-npm-dirs
          bun run artifacts
      - name: Publish to npm
        working-directory: crates/bindings/scah-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun run prepublishOnly
          npm publish --access public --provenance --ignore-scripts
